<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#0e0e11",
            surface: "#0e0e11",
            "surface-container-low": "#141317",
            "surface-container-high": "#201f24",
            "surface-container-highest": "#26252b",
            "surface-bright": "#2d2b31",
            "on-surface": "#f1ecf2",
            "on-surface-variant": "#adaaaf",
            primary: "#d0bcff",
            "primary-container": "#a996d7",
            "on-primary": "#47366f",
            secondary: "#e9def9",
            outline: "#777479",
            "outline-variant": "#49474c",
            error: "#ff6e84"
          },
          fontFamily: {
            body: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background: #0e0e11;
      color: #f1ecf2;
      font-family: Inter, sans-serif;
      min-height: 100dvh;
    }
  </style>
</head>
<body class="min-h-screen pb-32 selection:bg-primary-container selection:text-on-primary">
  <header class="fixed top-0 z-50 flex h-16 w-full items-center justify-between bg-[#0e0e11]/70 px-4 backdrop-blur-xl">
    <div class="flex items-center gap-4">
      <button class="flex h-10 w-10 items-center justify-center rounded-full text-on-surface-variant transition-colors hover:bg-surface-bright">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <h1 class="text-xl font-semibold tracking-tight">Winland</h1>
    </div>
    <div class="h-8 w-8 overflow-hidden rounded-full border border-outline-variant/20 bg-surface-container-high"></div>
  </header>

  <main class="mx-auto max-w-2xl space-y-12 px-6 pt-24">
    <header class="space-y-2">
      <h2 class="text-5xl font-semibold leading-tight tracking-tight">Settings</h2>
      <p class="text-lg text-on-surface-variant">Configure your environment and preferences.</p>
    </header>

    <section class="space-y-6">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">aspect_ratio</span>
        <h3 class="text-xl font-medium">Display</h3>
      </div>
      <div class="space-y-8 rounded-2xl bg-surface-container-low p-6">
        <div class="space-y-3">
          <label class="ml-1 text-xs font-semibold uppercase tracking-widest text-on-surface-variant">Screen Size</label>
          <div class="flex rounded-full border border-outline-variant/20 bg-surface px-1 py-1">
            <button class="flex-1 rounded-full py-2 text-sm text-on-surface-variant hover:bg-surface-bright">Compact</button>
            <button class="flex-1 rounded-full bg-gradient-to-br from-primary to-primary-container py-2 text-sm font-medium text-on-primary">Standard</button>
            <button class="flex-1 rounded-full py-2 text-sm text-on-surface-variant hover:bg-surface-bright">Ultra</button>
          </div>
        </div>
        <div class="space-y-3">
          <label class="ml-1 text-xs font-semibold uppercase tracking-widest text-on-surface-variant">Resolution</label>
          <button class="flex w-full items-center justify-between border-b border-outline-variant px-1 py-3 text-left hover:border-primary">
            <span>3840 x 2160 (4K)</span>
            <span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
          </button>
        </div>
      </div>
    </section>

    <section class="space-y-6">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">palette</span>
        <h3 class="text-xl font-medium">Appearance</h3>
      </div>
      <div class="space-y-8 rounded-2xl bg-surface-container-low p-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="font-medium">Dark Mode</p>
            <p class="text-sm text-on-surface-variant">Reduce eye strain in low light</p>
          </div>
          <button class="flex h-7 w-12 items-center rounded-full bg-primary px-1">
            <span class="ml-auto h-5 w-5 rounded-full bg-on-primary"></span>
          </button>
        </div>
        <div class="space-y-4">
          <p class="font-medium">Accent Color</p>
          <div class="flex gap-4">
            <button class="h-10 w-10 rounded-full bg-primary ring-2 ring-primary ring-offset-2 ring-offset-background"></button>
            <button class="h-10 w-10 rounded-full bg-[#fec5d6]"></button>
            <button class="h-10 w-10 rounded-full bg-[#dad0ea]"></button>
            <button class="h-10 w-10 rounded-full bg-[#663d4b]"></button>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
