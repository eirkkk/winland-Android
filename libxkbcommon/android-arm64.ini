[binaries]
c = '/opt/android/ndk/toolchains/llvm/prebuilt/linux-aarch64/bin/aarch64-linux-android24-clang'
cpp = '/opt/android/ndk/toolchains/llvm/prebuilt/linux-aarch64/bin/aarch64-linux-android24-clang++'
ar = '/opt/android/ndk/toolchains/llvm/prebuilt/linux-aarch64/bin/llvm-ar'
strip = '/opt/android/ndk/toolchains/llvm/prebuilt/linux-aarch64/bin/llvm-strip'
pkgconfig = '/usr/bin/pkg-config'

[properties]
sys_root = '/opt/android/ndk/toolchains/llvm/prebuilt/linux-aarch64/sysroot'
link_args = ['-fuse-ld=lld', '-L/opt/android/ndk/toolchains/llvm/prebuilt/linux-aarch64/lib/clang/21/lib/linux/aarch64']
c_args = ['--target=aarch64-linux-android24', '-D__ANDROID_API__=24']
c_link_args = ['--target=aarch64-linux-android24', '-fuse-ld=lld', '-Wl,--threads=1']

[host_machine]
system = 'android'
cpu_family = 'aarch64'
cpu = 'armv8a'
endian = 'little'
